name: Market Mentor Daily Briefing

# cron: UTC 기준. KST 06:30 = UTC 21:30 (전날)
# 0-4 = 일~목(UTC) -> 월~금(KST 06:30)
"on":
  schedule:
    - cron: '30 21 * * 0-4'
  workflow_dispatch:
    inputs: {}

jobs:
  send-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance feedparser requests

      - name: Run Market Mentor
        env:
          TG_TOKEN:        ${{ secrets.TG_TOKEN }}
          TG_CHAT:         ${{ secrets.TG_CHAT }}
          GMAIL_USER:      ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PW:    ${{ secrets.GMAIL_APP_PW }}
          MAIL_TO:         ${{ secrets.MAIL_TO }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          SLACK_WEBHOOK:   ${{ secrets.SLACK_WEBHOOK }}
        run: python market_mentor.py
